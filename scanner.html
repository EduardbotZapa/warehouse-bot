<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scanner</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --border: #2e2e2e;
  --green: #00e676;
  --text: #ffffff;
  --muted: #777;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Camera */
#camera-wrap {
  position: relative;
  width: 100%;
  height: 45vw;
  background: #000;
  overflow: hidden;
  flex-shrink: 0;
}

#video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#canvas { display: none; }

/* Viewfinder */
.finder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.finder-box {
  width: 70%;
  height: 35%;
  position: relative;
  border: 2px solid rgba(0,230,118,0.3);
}

.finder-box::before,
.finder-box::after,
.finder-box .c3,
.finder-box .c4 {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  border-color: var(--green);
  border-style: solid;
}
.finder-box::before { top:-2px; left:-2px; border-width:3px 0 0 3px; }
.finder-box::after  { top:-2px; right:-2px; border-width:3px 3px 0 0; }
.finder-box .c3     { bottom:-2px; right:-2px; border-width:0 3px 3px 0; }
.finder-box .c4     { bottom:-2px; left:-2px; border-width:0 0 3px 3px; }

.laser {
  position: absolute;
  left: 10%; right: 10%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
  animation: laser 1.8s ease-in-out infinite;
  top: 20%;
}

@keyframes laser {
  0%,100% { top: 15%; opacity: 0.3; }
  50% { top: 80%; opacity: 1; }
}

.finder-hint {
  position: absolute;
  bottom: 8px;
  left: 0; right: 0;
  text-align: center;
  font-size: 11px;
  color: rgba(255,255,255,0.5);
}

/* Flash */
#flash-overlay {
  position: absolute;
  inset: 0;
  background: var(--green);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.05s;
}

/* Content */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 12px;
  gap: 10px;
  overflow: hidden;
}

/* Mode tabs */
.tabs {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.tab {
  flex: 1;
  padding: 9px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}

.tab.active {
  background: var(--green);
  border-color: var(--green);
  color: #000;
  font-weight: 700;
}

/* Current article */
#article-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  display: none;
  flex-shrink: 0;
}

#article-bar.show { display: block; }
#article-bar span { color: var(--muted); font-size: 11px; display: block; margin-bottom: 2px; }
#article-bar strong { font-size: 15px; letter-spacing: -0.3px; }

/* List */
.list-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.list-header span { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }

.badge {
  background: var(--green);
  color: #000;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  min-width: 24px;
  text-align: center;
}

#list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  -webkit-overflow-scrolling: touch;
}

.empty {
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  padding: 20px;
}

.item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: pop 0.2s ease;
}

.item.fresh { border-color: var(--green); }

@keyframes pop {
  from { opacity: 0; transform: scale(0.95); }
  to   { opacity: 1; transform: scale(1); }
}

.item-n { font-size: 11px; color: var(--muted); min-width: 18px; }

.item-info { flex: 1; min-width: 0; }
.item-serial { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-art { font-size: 11px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.item-del {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
  flex-shrink: 0;
}

/* Buttons */
.btn-row {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}

.btn {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: opacity 0.15s, transform 0.1s;
}

.btn:active { transform: scale(0.97); }
.btn-clear { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-send { background: var(--green); color: #000; }
.btn-send:disabled { opacity: 0.35; }
</style>
</head>
<body>

<div id="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="flash-overlay"></div>
  <div class="finder">
    <div class="finder-box">
      <div class="c3"></div>
      <div class="c4"></div>
      <div class="laser"></div>
    </div>
    <div class="finder-hint" id="hint">Наведіть на штрихкод поля S</div>
  </div>
</div>

<div class="content">
  <div class="tabs">
    <button class="tab active" onclick="setMode('serial')" id="tab-s">📋 Серійний №</button>
    <button class="tab" onclick="setMode('article')" id="tab-a">🏷 Артикул</button>
  </div>

  <div id="article-bar">
    <span>Поточний артикул</span>
    <strong id="art-val">—</strong>
  </div>

  <div class="list-header">
    <span>Відскановано</span>
    <div class="badge" id="badge">0</div>
  </div>

  <div id="list">
    <div class="empty">Наведіть камеру на штрихкод</div>
  </div>

  <div class="btn-row">
    <button class="btn btn-clear" onclick="clearAll()">Очистити</button>
    <button class="btn btn-send" id="btn-send" onclick="sendData()" disabled>Надіслати боту</button>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.ready(); }

let mode = 'serial';
let scanned = [];
let currentArticle = '';
let scanning = true;
let lastValue = '';
let lastTime = 0;
let animFrame;

// ── ZXing via CDN ──────────────────────────────────────────────────────
const ZXING_CDN = 'https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js';

function loadZXing() {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = ZXING_CDN;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function startScanner() {
  try {
    await loadZXing();
    const hints = new Map();
    const formats = [
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.DATA_MATRIX,
      ZXing.BarcodeFormat.QR_CODE,
    ];
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

    const reader = new ZXing.MultiFormatReader();
    reader.setHints(hints);

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });

    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function tick() {
      if (!scanning) { animFrame = requestAnimationFrame(tick); return; }
      if (video.readyState !== video.HAVE_ENOUGH_DATA) { animFrame = requestAnimationFrame(tick); return; }

      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);

      try {
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const lum = ZXing.RGBLuminanceSource
          ? new ZXing.RGBLuminanceSource(imgData.data, canvas.width, canvas.height)
          : null;

        if (lum) {
          const bmp = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lum));
          const result = reader.decode(bmp);
          if (result) onScan(result.getText());
        }
      } catch(e) {
        // NotFoundException is normal — no barcode in frame
      }

      animFrame = requestAnimationFrame(tick);
    }

    animFrame = requestAnimationFrame(tick);

  } catch(err) {
    console.error(err);
    document.getElementById('camera-wrap').innerHTML =
      `<div style="padding:30px;text-align:center;color:#777;font-size:13px">
        ❌ Немає доступу до камери.<br><br>
        Дозвольте доступ у налаштуваннях браузера.
      </div>`;
  }
}

// ── Scan handler ───────────────────────────────────────────────────────
function onScan(text) {
  text = text.trim();
  const now = Date.now();
  if (text === lastValue && now - lastTime < 2500) return;
  lastValue = text;
  lastTime  = now;

  flash();
  vibrate();

  if (mode === 'article') {
    currentArticle = text;
    document.getElementById('art-val').textContent = text;
    document.getElementById('article-bar').classList.add('show');
    return;
  }

  scanned.unshift({ serial: text, article: currentArticle });
  render();
}

// ── UI helpers ─────────────────────────────────────────────────────────
function flash() {
  const el = document.getElementById('flash-overlay');
  el.style.opacity = '0.5';
  setTimeout(() => el.style.opacity = '0', 150);
}

function vibrate() {
  try { navigator.vibrate?.(50); } catch(e){}
  try { tg?.HapticFeedback?.impactOccurred('light'); } catch(e){}
}

function setMode(m) {
  mode = m;
  document.getElementById('tab-s').classList.toggle('active', m === 'serial');
  document.getElementById('tab-a').classList.toggle('active', m === 'article');
  document.getElementById('hint').textContent =
    m === 'serial' ? 'Наведіть на штрихкод поля S' : 'Наведіть на штрихкод поля 1P';
}

function render() {
  const list  = document.getElementById('list');
  const badge = document.getElementById('badge');
  const btn   = document.getElementById('btn-send');

  badge.textContent = scanned.length;
  btn.disabled = scanned.length === 0;

  if (!scanned.length) {
    list.innerHTML = '<div class="empty">Наведіть камеру на штрихкод</div>';
    return;
  }

  list.innerHTML = scanned.map((it, i) => `
    <div class="item ${i === 0 ? 'fresh' : ''}" id="i${i}">
      <span class="item-n">${scanned.length - i}</span>
      <div class="item-info">
        <div class="item-serial">${it.serial}</div>
        ${it.article ? `<div class="item-art">${it.article}</div>` : ''}
      </div>
      <button class="item-del" onclick="del(${i})">×</button>
    </div>
  `).join('');

  setTimeout(() => document.getElementById('i0')?.classList.remove('fresh'), 600);
}

function del(i) { scanned.splice(i, 1); render(); }

function clearAll() {
  scanned = [];
  currentArticle = '';
  document.getElementById('article-bar').classList.remove('show');
  render();
}

function sendData() {
  if (!scanned.length) return;
  const payload = JSON.stringify({ action: 'serials', items: scanned });
  if (tg) {
    tg.sendData(payload);
  } else {
    alert('Дані: ' + payload);
  }
}

// ── Start ──────────────────────────────────────────────────────────────
startScanner();
</script>
</body>
</html>
