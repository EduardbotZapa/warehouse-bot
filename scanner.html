<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scanner</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0f0f0f; --surface:#1c1c1e; --border:#2c2c2e;
  --green:#30d158; --blue:#0a84ff; --red:#ff453a;
  --text:#fff; --muted:#8e8e93;
}
body {
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  min-height:100vh; display:flex; flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom);
}

/* Header */
.header {
  padding:14px 16px 10px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.logo { font-size:24px; }
.header h1 { font-size:16px; font-weight:700; }
.header p  { font-size:12px; color:var(--muted); }

/* Scanner button — big tap target */
.scan-zone {
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
  flex-shrink:0;
}

.scan-btn {
  width:100%;
  padding:20px;
  border-radius:16px;
  border:2px dashed var(--green);
  background:rgba(48,209,88,0.08);
  color:var(--green);
  font-size:17px;
  font-weight:700;
  cursor:pointer;
  font-family:inherit;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  transition:all 0.15s;
  position:relative;
  overflow:hidden;
}

.scan-btn:active { background:rgba(48,209,88,0.18); transform:scale(0.98); }

/* Hidden file input for barcode */
#barcode-input {
  position:absolute;
  inset:0;
  opacity:0;
  cursor:pointer;
  font-size:0;
}

/* Mode tabs */
.tabs {
  display:flex;
  gap:8px;
}
.tab {
  flex:1; padding:10px; border-radius:10px;
  border:1px solid var(--border); background:var(--surface);
  color:var(--muted); font-size:13px; font-weight:600;
  cursor:pointer; font-family:inherit; transition:all 0.15s;
}
.tab.active { background:var(--blue); border-color:var(--blue); color:#fff; }

/* Article display */
#art-bar {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:12px 14px; display:none;
}
#art-bar.show { display:block; }
#art-bar small { color:var(--muted); font-size:11px; display:block; margin-bottom:3px; }
#art-bar strong { font-size:15px; letter-spacing:-0.3px; }

/* Manual input */
.manual-wrap {
  display:flex; gap:8px;
}
.manual-input {
  flex:1; padding:11px 14px; border-radius:10px;
  border:1px solid var(--border); background:var(--surface);
  color:var(--text); font-size:14px; font-family:inherit;
  outline:none;
}
.manual-input:focus { border-color:var(--blue); }
.manual-add {
  padding:11px 16px; border-radius:10px;
  background:var(--blue); border:none; color:#fff;
  font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
}

/* List */
.list-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:0 16px;
}
.list-header span { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; }
.badge {
  background:var(--green); color:#000;
  font-size:11px; font-weight:800;
  padding:2px 8px; border-radius:20px; min-width:24px; text-align:center;
}

#list {
  flex:1; overflow-y:auto; padding:0 16px;
  display:flex; flex-direction:column; gap:6px;
  -webkit-overflow-scrolling:touch;
  min-height:80px;
}

.empty { text-align:center; color:var(--muted); font-size:13px; padding:24px; }

.item {
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:10px 12px;
  display:flex; align-items:center; gap:10px;
  animation:pop 0.2s ease;
}
.item.fresh { border-color:var(--green); }

@keyframes pop {
  from { opacity:0; transform:translateY(-6px) scale(0.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

.item-n { font-size:11px; color:var(--muted); min-width:18px; }
.item-info { flex:1; min-width:0; }
.item-serial { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.item-art { font-size:11px; color:var(--muted); margin-top:1px; }
.item-del {
  background:none; border:none; color:var(--muted);
  font-size:22px; cursor:pointer; padding:0 2px; line-height:1;
}

/* Bottom buttons */
.btn-row {
  display:flex; gap:8px; padding:12px 16px;
  flex-shrink:0;
}
.btn {
  flex:1; padding:14px; border-radius:14px; border:none;
  font-size:15px; font-weight:700; cursor:pointer; font-family:inherit;
  transition:opacity 0.15s, transform 0.1s;
}
.btn:active { transform:scale(0.97); }
.btn-clear { background:var(--surface); color:var(--text); border:1px solid var(--border); }
.btn-send  { background:var(--green); color:#000; }
.btn-send:disabled { opacity:0.3; cursor:not-allowed; }

/* Success toast */
.toast {
  position:fixed; top:16px; left:50%; transform:translateX(-50%) translateY(-80px);
  background:var(--green); color:#000;
  padding:10px 20px; border-radius:20px;
  font-size:14px; font-weight:700;
  transition:transform 0.3s ease;
  z-index:999; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="toast" id="toast">✓ Додано!</div>

<div class="header">
  <div class="logo">📦</div>
  <div>
    <h1>Warehouse Scanner</h1>
    <p id="mode-label">Режим: Серійний номер (S)</p>
  </div>
</div>

<div class="scan-zone">
  <!-- Mode tabs -->
  <div class="tabs">
    <button class="tab active" onclick="setMode('serial')" id="tab-s">📋 Серійний №</button>
    <button class="tab" onclick="setMode('article')" id="tab-a">🏷 Артикул</button>
  </div>

  <!-- BIG SCAN BUTTON -->
  <button class="scan-btn" id="scan-btn">
    <span>📷</span>
    <span id="scan-label">Сканувати штрихкод S</span>
    <input
      type="text"
      id="barcode-input"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="characters"
      spellcheck="false"
      inputmode="none"
      placeholder=""
    />
  </button>

  <!-- Article bar -->
  <div id="art-bar">
    <small>Поточний артикул</small>
    <strong id="art-val">—</strong>
  </div>

  <!-- Manual input fallback -->
  <div class="manual-wrap">
    <input class="manual-input" id="manual" placeholder="Або введіть вручну..." autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
    <button class="manual-add" onclick="addManual()">+</button>
  </div>
</div>

<div class="list-header">
  <span>Відскановано</span>
  <div class="badge" id="badge">0</div>
</div>

<div id="list">
  <div class="empty">Натисніть кнопку сканування вище</div>
</div>

<div class="btn-row">
  <button class="btn btn-clear" onclick="clearAll()">Очистити</button>
  <button class="btn btn-send" id="btn-send" onclick="sendData()" disabled>Надіслати боту</button>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.ready(); }

let mode = 'serial';
let scanned = [];
let currentArticle = '';

// ── Mode ──────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('tab-s').classList.toggle('active', m === 'serial');
  document.getElementById('tab-a').classList.toggle('active', m === 'article');
  document.getElementById('mode-label').textContent =
    m === 'serial' ? 'Режим: Серійний номер (S)' : 'Режим: Артикул (1P)';
  document.getElementById('scan-label').textContent =
    m === 'serial' ? 'Сканувати штрихкод S' : 'Сканувати штрихкод 1P';
}

// ── Barcode input (works with Bluetooth scanners & some camera inputs) ─
const barcodeInput = document.getElementById('barcode-input');
const scanBtn = document.getElementById('scan-btn');

// Focus input when scan button tapped
scanBtn.addEventListener('click', (e) => {
  if (e.target === barcodeInput) return;
  barcodeInput.focus();
});

// On any input (scanner sends text + Enter, or camera barcode)
let buffer = '';
let bufferTimer;

barcodeInput.addEventListener('input', (e) => {
  buffer += e.target.value;
  e.target.value = '';
  clearTimeout(bufferTimer);
  bufferTimer = setTimeout(() => {
    if (buffer.trim()) {
      onScan(buffer.trim());
      buffer = '';
    }
  }, 100);
});

barcodeInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === 'Tab') {
    e.preventDefault();
    const val = (buffer + barcodeInput.value).trim();
    barcodeInput.value = '';
    buffer = '';
    clearTimeout(bufferTimer);
    if (val) onScan(val);
  }
});

// ── BarcodeDetector API (Chrome, Safari 17+) ──────────────────────────
let detector = null;
let videoStream = null;
let videoEl = null;
let detecting = false;

async function tryNativeDetector() {
  if (!('BarcodeDetector' in window)) return false;

  try {
    detector = new BarcodeDetector({
      formats: ['code_128', 'code_39', 'ean_13', 'ean_8', 'qr_code', 'data_matrix', 'pdf417']
    });

    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
    });

    videoEl = document.createElement('video');
    videoEl.srcObject = videoStream;
    videoEl.setAttribute('playsinline', true);
    videoEl.muted = true;
    await videoEl.play();

    // Replace scan button look
    document.getElementById('scan-btn').style.borderStyle = 'solid';
    document.getElementById('scan-btn').style.background = 'rgba(48,209,88,0.15)';
    document.getElementById('scan-label').textContent = '📷 Камера активна — наводьте';
    barcodeInput.style.display = 'none';

    detectLoop();
    return true;
  } catch(e) {
    console.log('BarcodeDetector failed:', e);
    return false;
  }
}

let lastDetected = '';
let lastDetectedTime = 0;

async function detectLoop() {
  if (!detector || !videoEl) return;
  detecting = true;

  try {
    const barcodes = await detector.detect(videoEl);
    for (const bc of barcodes) {
      const val = bc.rawValue?.trim();
      if (!val) continue;
      const now = Date.now();
      if (val === lastDetected && now - lastDetectedTime < 2500) continue;
      lastDetected = val;
      lastDetectedTime = now;
      onScan(val);
    }
  } catch(e) {}

  if (detecting) requestAnimationFrame(detectLoop);
}

// ── onScan ────────────────────────────────────────────────────────────
function onScan(text) {
  text = text.replace(/[\r\n\t]/g, '').trim();
  if (!text || text.length < 2) return;

  vibrate();
  showToast(text);

  if (mode === 'article') {
    currentArticle = text;
    document.getElementById('art-val').textContent = text;
    document.getElementById('art-bar').classList.add('show');
    return;
  }

  scanned.unshift({ serial: text, article: currentArticle });
  render();
}

// ── Manual input ──────────────────────────────────────────────────────
function addManual() {
  const val = document.getElementById('manual').value.trim();
  if (!val) return;
  document.getElementById('manual').value = '';
  onScan(val);
}

document.getElementById('manual').addEventListener('keydown', e => {
  if (e.key === 'Enter') addManual();
});

// ── Render ────────────────────────────────────────────────────────────
function render() {
  const list  = document.getElementById('list');
  const badge = document.getElementById('badge');
  const btn   = document.getElementById('btn-send');

  badge.textContent = scanned.length;
  btn.disabled = scanned.length === 0;

  if (!scanned.length) {
    list.innerHTML = '<div class="empty">Натисніть кнопку сканування вище</div>';
    return;
  }

  list.innerHTML = scanned.map((it, i) => `
    <div class="item ${i === 0 ? 'fresh' : ''}" id="i${i}">
      <span class="item-n">${scanned.length - i}</span>
      <div class="item-info">
        <div class="item-serial">${esc(it.serial)}</div>
        ${it.article ? `<div class="item-art">${esc(it.article)}</div>` : ''}
      </div>
      <button class="item-del" onclick="del(${i})">×</button>
    </div>
  `).join('');

  setTimeout(() => document.getElementById('i0')?.classList.remove('fresh'), 600);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function del(i) { scanned.splice(i, 1); render(); }

function clearAll() {
  scanned = [];
  currentArticle = '';
  document.getElementById('art-bar').classList.remove('show');
  render();
}

// ── Toast ─────────────────────────────────────────────────────────────
function showToast(text) {
  const t = document.getElementById('toast');
  t.textContent = `✓ ${text.length > 20 ? text.slice(0,20)+'…' : text}`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function vibrate() {
  try { navigator.vibrate?.(40); } catch(e){}
  try { tg?.HapticFeedback?.impactOccurred('light'); } catch(e){}
}

// ── Send ──────────────────────────────────────────────────────────────
function sendData() {
  if (!scanned.length) return;
  const payload = JSON.stringify({ action: 'serials', items: scanned });
  if (tg?.sendData) {
    tg.sendData(payload);
  } else {
    alert('Debug: ' + payload);
  }
}

// ── Init ──────────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  const hasNative = await tryNativeDetector();
  if (!hasNative) {
    // Fallback: show instructions for manual/Bluetooth
    document.getElementById('scan-label').textContent = 'Натисніть → відскануйте або введіть вручну';
  }
});

// Stop camera when page hides
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    detecting = false;
    videoStream?.getTracks().forEach(t => t.stop());
  }
});
</script>
</body>
</html>
